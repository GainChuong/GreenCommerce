<!doctype html>
<html lang="en">
    <head>
  <meta name="description" content="ReFashion - Hệ sinh thái thời trang tuần hoàn kết nối người mua, nhà thiết kế tái sinh và quản trị viên minh bạch.">
  <meta property="og:title" content="ReFashion - Thời trang Tái sinh & Bền vững">
  <meta property="og:description" content="Hệ sinh thái thời trang tuần hoàn kết nối người mua, nhà thiết kế tái sinh và quản trị viên minh bạch.">
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register | ReFashion</title>

        <link rel="stylesheet" href="../css/auth.css" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="auth-container">
            <!-- LEFT -->

            <div class="auth-left">
                <div class="logo">♻ ReFashion</div>

                <h1>Welcome!</h1>

                <p>Start your sustainable fashion journey.</p>

                <form>
                    <input type="text" id="regUsername" placeholder="Username" required />

                    <input
                        type="password"
                        id="regPassword"
                        placeholder="Password"
                        required
                    />

                    <input
                        type="password"
                        id="regConfirmPassword"
                        placeholder="Confirm Password"
                        required
                    />

                    <input type="email" id="regEmail" placeholder="Email" required />

                    <input type="tel" id="regPhone" placeholder="Phone Number" required />

                    <button type="submit" class="primary-btn">Sign Up</button>
                </form>

                <div class="divider">
                    <span>or continue</span>
                </div>

                <button class="social-btn">
                    <i class="fa-brands fa-google"></i>
                    Continue with Google
                </button>

                <button class="social-btn">
                    <i class="fa-brands fa-apple"></i>
                    Continue with Apple
                </button>

                <p class="bottom-text">
                    Already have an account?
                    <a href="login.html">Sign In</a>
                </p>
            </div>

            <!-- RIGHT -->

            <div class="auth-right">
                <div class="slider-content">
                    <img
                        id="sliderImage"
                        src="../images/slide1.png"
                        alt="ReFashion Brand Showcase Image"
                    />

                    <h2 id="sliderTitle">Give Clothes A Second Life</h2>

                    <p id="sliderDesc">
                        Donate, exchange and transform unused clothing into
                        valuable fashion resources.
                    </p>
                </div>
            </div>
        </div>

        <script src="../js/mainjs.js"></script>
        <script src="../js/auth.js"></script>
    </body>
</html>
