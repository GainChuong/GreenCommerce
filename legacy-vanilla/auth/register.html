<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | ReFashion</title>

        <link rel="stylesheet" href="../css/auth.css" />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
    </head>
    <body>
        <div class="auth-container">
            <!-- LEFT -->

            <div class="auth-left">
                <div class="logo">♻ ReFashion</div>

                <h1>Welcome!</h1>

                <p>Start your sustainable fashion journey.</p>

                <form>
                    <input type="text" placeholder="Username" required />

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    />

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required
                    />

                    <input type="email" placeholder="Email" required />

                    <input type="tel" placeholder="Phone Number" required />

                    <button class="primary-btn">Sign Up</button>
                </form>

                <div class="divider">
                    <span>or continue</span>
                </div>

                <button class="social-btn">
                    <i class="fa-brands fa-google"></i>
                    Continue with Google
                </button>

                <button class="social-btn">
                    <i class="fa-brands fa-apple"></i>
                    Continue with Apple
                </button>

                <p class="bottom-text">
                    Don't have an account?
                    <a href="register.html">Sign Up</a>
                </p>
            </div>

            <!-- RIGHT -->

            <div class="auth-right">
                <div class="slider-content">
                    <img
                        id="sliderImage"
                        src="../assets/images/auth/slide1.png"
                    />

                    <h2 id="sliderTitle">Give Clothes A Second Life</h2>

                    <p id="sliderDesc">
                        Donate, exchange and transform unused clothing into
                        valuable fashion resources.
                    </p>
                </div>
            </div>
        </div>

        <script src="../js/auth.js"></script>
    </body>
</html>
